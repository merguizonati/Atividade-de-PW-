<html> <!-- section, article, aside, footer-->
    <head>
        <title> Lição - classes HTML 5 </title>
        <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital@0;1&display=swap');
        p, h1, h2{
            color:aliceblue
        }
        header {
                border: 1px solid #ddd;
                padding: 2rem;
                text-align: center;
            }
        * {
                margin: 2px;
                padding: 0;
                box-sizing: border-box
            }
        body {
                background-color: rgb(21, 66, 117);
                color: #f8f2ed;
                font-family: "Inconsolata", monospace;
                font-optical-sizing: auto;
                font-weight: 400;
                font-style: normal;
                font-variation-settings:
                "wdth" 100
            }
        nav ul {
                border: 1px solid #ddd;
                list-style: none;
                margin: 0;
                padding: 0;
                display: flex;
                justify-content: center;
                gap: 20px
            }
        section {
            width: 40%;
            flex: 3;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 15px;
        }

        aside {
            border: 1px solid #ddd;
            border-radius: 5px;
            width: 30%;
            flex: 1;
            padding: 15px
        }
        
        article {
            background-color: #050d1d;
            padding: 20px;
            margin: 10px 0;
            border: 1px solid #ccc;
        }
        main {
           max-width: 10000px;
            margin: 20px auto;
            padding: 140px;
            background-color: #262438;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            align-items: stretch;
            gap: 20px;
            margin-top: 20px;
        }
        footer {
            border: 1px solid #ddd;
            display: flex;
            justify-content: center;
            border-radius: 5px;
            padding: 10px;
            width: 100%;
            float: center;
            margin-left: 20px;
            box-sizing: border-box
        }
        article, aside {
            width: 100px;
        }
        </style>
    </head>
<body>
    <header>
        <p> Lição das Tags - HEADER </p>
    </header>
    <nav>
        <ul>
            <p>  NAV - </p>
        <li><a href="https://www.youtube.com/?app=desktop&hl=pt">Youtube</a></li>
        <li><a href="https://www.instagram.com/">Instagram</a></li>
        <li><a href="https://www.google.com/?hl=pt_BR">Google</a></li>
        </ul>
    </nav>
<main>
    <section>
        SECTION
        <article>
            ARTICLE
        </article>
    </section>
    <aside>
        ASIDE - opa
    </aside>
</main>
    <footer>
        <p> FOOTER - Feito por Natalia e Enzo </p>
    </footer>
</body>
